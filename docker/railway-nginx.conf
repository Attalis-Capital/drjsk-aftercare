# Railway single-container nginx: fronts php-fpm on 127.0.0.1:9000 and listens
# on the Railway-assigned $PORT (substituted at container start by the
# entrypoint via envsubst). Serves the Laravel public/ directory.
server {
    listen ${PORT};
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Belt-and-braces: emit noindex at the edge too (the app also sets it via
    # middleware). Staging must never be indexed.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
