; Railway staging upload limits (mission #1723).
; php.ini-production ships upload_max_filesize=2M / post_max_size=8M, which reject
; a real phone wound photo (2-5 MB) BEFORE nginx's client_max_body_size ever
; applies - PHP is the first gate. A rejected upload kills the exact proof this
; staging instance exists for (phone photo -> live triage -> doctor alert).
; post_max_size must exceed upload_max_filesize (it also bounds the whole
; multipart body incl. fields), so 26M vs 25M. Aligns with the app's own
; validation ceiling (max:20480 KB = 20 MB) with headroom, and sits under nginx's
; 50M client_max_body_size so nginx is never the tighter gate.
upload_max_filesize = 25M
post_max_size = 26M
memory_limit = 256M
max_execution_time = 120
